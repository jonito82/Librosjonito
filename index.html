<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Books">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1c1c1e" media="(prefers-color-scheme: dark)">
<title>Books</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f5f5f5;--surface:#fff;--surface2:#f5f5f5;--border:#e5e5ea;
    --text:#1c1c1e;--text2:#6e6e73;--text3:#aeaeb2;
    --accent:#007aff;--accent-soft:#e8f0fe;
    --green:#34c759;--red:#ff3b30;--orange:#ff9500;--yellow:#ffcc00;
    --radius:14px;--radius-sm:10px;
    --nav-h:54px;--nav-pb:env(safe-area-inset-bottom,0px);
    --shadow:0 2px 12px rgba(0,0,0,.08);
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1c1c1e;--surface:#2c2c2e;--surface2:#3a3a3c;--border:#38383a;
      --text:#f5f5f7;--text2:#aeaeb2;--text3:#636366;
      --accent:#0a84ff;--accent-soft:#1a2a4a;
      --shadow:0 2px 12px rgba(0,0,0,.3);
    }
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
  body{overflow:hidden;display:flex;flex-direction:column}

  /* ── HEADER ── */
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px 12px;padding-top:calc(16px + env(safe-area-inset-top,0px));display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .header h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
  .header-actions{display:flex;gap:8px;align-items:center}
  .sync-dot{display:none}
  .settings-btn{background:none;border:none;display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:20px;cursor:pointer;color:var(--text2);font-size:12px;font-weight:500;font-family:inherit;transition:background .15s;-webkit-tap-highlight-color:transparent}
  .settings-btn:hover{background:var(--surface2)}
  .settings-btn svg{width:16px;height:16px;flex-shrink:0;color:var(--text3)}
  .settings-btn .sync-label{color:var(--text3);font-size:11px}
  .settings-btn .sync-label.ok{color:var(--green)}
  .settings-btn .sync-label.error{color:var(--red)}
  .settings-btn .sync-label.pending{color:var(--orange)}
  @keyframes pulse{to{opacity:.3}}
  .icon-btn{background:none;border:none;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:16px;transition:background .15s}
  .icon-btn:hover{background:var(--surface2)}

  /* ── MAIN SCROLL ── */
  .main{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 16px calc(var(--nav-h) + var(--nav-pb) + 24px);-webkit-overflow-scrolling:touch}

  /* ── BOTTOM NAV ── */
  .nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--nav-pb));background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:6px;z-index:50}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;border:none;background:none;color:var(--text3);font-size:9px;font-weight:500;transition:color .15s}
  .nav-item.active{color:var(--accent)}
  .nav-item svg{width:20px;height:20px}

  /* ── CARDS ── */
  .card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .card+.card{margin-top:12px}

  /* ── CURRENT BOOK CARD (Inicio) ── */
  .book-current{display:flex;gap:14px;padding:16px}
  .book-cover-wrap{position:relative;flex-shrink:0}
  .book-cover{width:80px;height:120px;object-fit:cover;border-radius:var(--radius-sm);background:var(--surface2);display:block}
  .book-cover-placeholder{width:80px;height:120px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),#5856d6);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;flex-shrink:0}
  .badge{position:absolute;top:6px;left:6px;background:var(--green);color:#fff;font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px}
  .book-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
  .book-title{font-size:14px;font-weight:600;line-height:1.25;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .book-author{font-size:12px;color:var(--text2)}
  .book-meta{font-size:11px;color:var(--text3)}
  .book-actions{display:flex;gap:8px;margin-top:auto;padding-top:4px}
  .btn{border:none;border-radius:8px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s;font-family:inherit}
  .btn:active{opacity:.7}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-ghost{background:var(--surface2);color:var(--text)}
  .btn-danger{background:#fff1f0;color:var(--red)}
  @media(prefers-color-scheme:dark){.btn-danger{background:#2c1f1f;color:var(--red)}}

  .inicio-cover{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:8px;background:var(--surface2);display:block}
  .inicio-cover-ph{width:100%;aspect-ratio:2/3;border-radius:8px;background:linear-gradient(135deg,var(--accent),#5856d6);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff}

  /* ── DRILL-DOWN MODAL ── */
  .drill-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end}
  .drill-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:80vh;display:flex;flex-direction:column}
  .drill-header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
  .drill-title{font-size:17px;font-weight:700}
  .drill-body{overflow-y:auto;padding:12px 16px 32px;-webkit-overflow-scrolling:touch}
  .drill-book-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
  .drill-book-item:last-child{border-bottom:none}
  .drill-cover{width:36px;height:54px;object-fit:cover;border-radius:5px;background:var(--surface2);flex-shrink:0}
  .drill-cover-ph{width:36px;height:54px;border-radius:5px;background:linear-gradient(135deg,var(--accent),#5856d6);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
  .drill-info{flex:1;min-width:0}
  .drill-book-title{font-size:13px;font-weight:600;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.3}
  .drill-book-author{font-size:11px;color:var(--text2);margin-top:2px}
  .drill-book-year{font-size:10px;color:var(--text3);margin-top:1px}
  .empty{text-align:center;padding:60px 20px;color:var(--text2)}
  .empty-icon{font-size:48px;margin-bottom:12px}
  .empty h2{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px}
  .empty p{font-size:13px;line-height:1.5}

  /* ── GRID (Leídos) ── */
  .grid-covers{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px}
  .cover-item{cursor:pointer;display:flex;flex-direction:column;gap:6px}
  .cover-item img,.cover-thumb{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:var(--radius-sm);background:var(--surface2);display:block}
  .cover-thumb-placeholder{width:100%;aspect-ratio:2/3;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),#5856d6);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff}
  .cover-title{font-size:11px;font-weight:500;color:var(--text);line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .stars-sm{font-size:11px;color:var(--yellow)}

  /* ── LIST (Estantería / Abandonados) ── */
  .book-list-item{display:flex;gap:12px;padding:14px 16px;align-items:center;cursor:pointer}
  .book-list-item+.book-list-item{border-top:1px solid var(--border)}
  .list-cover{width:44px;height:66px;object-fit:cover;border-radius:6px;flex-shrink:0;background:var(--surface2)}
  .list-cover-ph{width:44px;height:66px;border-radius:6px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),#5856d6);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff}
  .list-info{flex:1;min-width:0}
  .list-title{font-size:13px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .list-author{font-size:11px;color:var(--text2);margin-top:2px}
  .list-date{font-size:10px;color:var(--text3);margin-top:4px}
  .list-chevron{color:var(--text3);font-size:14px}

  /* ── STATS ── */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .stat-card{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
  .stat-card.full{grid-column:1/-1}
  .stat-label{font-size:11px;color:var(--text2);font-weight:500;margin-bottom:4px}
  .stat-value{font-size:24px;font-weight:700;letter-spacing:-.5px}
  .stat-sub{font-size:12px;color:var(--text3);margin-top:2px}
  .chart-wrap{height:180px;position:relative}
  .rank-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
  .rank-item:last-child{border:none}
  .rank-name{font-size:13px;font-weight:500}
  .rank-count{font-size:13px;color:var(--text2)}

  /* ── FAB ── */
  .fab{position:fixed;bottom:calc(var(--nav-h) + var(--nav-pb) + 16px);right:20px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;font-size:24px;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,122,255,.4);display:flex;align-items:center;justify-content:center;z-index:49;transition:transform .15s}
  .fab:active{transform:scale(.93)}
  #tab-stats~.fab-anchor .fab{display:none}

  /* ── BACKDROP ── */
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
  .backdrop.show{opacity:1;pointer-events:auto}

  /* ── BOTTOM SHEET ── */
  .sheet{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-radius:20px 20px 0 0;z-index:101;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,0,.67,0);padding-bottom:env(safe-area-inset-bottom,0px);max-height:92vh;overflow-y:auto}
  .sheet.show{transform:translateY(0)}
  .sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 4px}
  .sheet-header{padding:8px 20px 16px;display:flex;align-items:center;justify-content:space-between}
  .sheet-title{font-size:16px;font-weight:700}
  .sheet-close{background:none;border:none;font-size:22px;color:var(--text2);cursor:pointer;padding:4px;line-height:1}
  .sheet-body{padding:0 20px 24px}

  /* ── FORM ── */
  .form-group{margin-bottom:16px}
  .form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}
  .form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
  .form-input:focus{border-color:var(--accent)}
  .form-input::placeholder{color:var(--text3)}
  textarea.form-input{resize:vertical;min-height:80px}
  .form-row{display:flex;gap:10px}
  .form-row .form-group{flex:1}
  .btn-full{width:100%;padding:13px;font-size:14px;border-radius:var(--radius-sm);margin-top:4px}

  /* ── STARS INPUT ── */
  .stars-input{display:flex;gap:8px;font-size:30px;cursor:pointer;color:var(--border)}
  .stars-input span.active{color:var(--yellow)}
  .stars-input span:hover{color:var(--yellow)}

  /* ── OPTION BUTTONS ── */
  .option-group{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
  .option-btn{display:flex;align-items:center;gap:14px;padding:14px;background:var(--surface2);border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:inherit;color:var(--text);font-size:13px;font-weight:500;transition:background .15s;text-align:left}
  .option-btn:hover{background:var(--border)}
  .option-icon{font-size:24px;flex-shrink:0}

  /* ── TOAST ── */
  .toast{position:fixed;bottom:calc(var(--nav-h) + var(--nav-pb) + 80px);left:50%;transform:translateX(-50%) translateY(16px);background:#1c1c1e;color:#fff;padding:9px 16px;border-radius:20px;font-size:12px;font-weight:500;z-index:200;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap}
  @media(prefers-color-scheme:dark){.toast{background:#f5f5f7;color:#1c1c1e}}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ── DETAIL MODAL ── */
  .detail-cover-wrap{display:flex;justify-content:center;margin-bottom:20px}
  .detail-cover{width:120px;height:180px;object-fit:cover;border-radius:var(--radius-sm);box-shadow:0 8px 24px rgba(0,0,0,.2)}
  .detail-cover-ph{width:120px;height:180px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),#5856d6);display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:700;color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.2)}
  .detail-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:4px;line-height:1.25}
  .detail-author{font-size:13px;color:var(--text2);text-align:center;margin-bottom:16px}
  .stars-display{text-align:center;font-size:24px;color:var(--yellow);margin-bottom:20px}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .detail-stat{background:var(--surface2);border-radius:10px;padding:12px 14px}
  .detail-stat-label{font-size:11px;color:var(--text2);font-weight:500;margin-bottom:2px}
  .detail-stat-value{font-size:16px;font-weight:700}
  .detail-notes{background:var(--surface2);border-radius:10px;padding:12px 14px;margin-bottom:16px}
  .detail-notes p{font-size:13px;color:var(--text);line-height:1.5}

  /* ── API KEY WARNING ── */
  .warning-box{background:#fff8e6;border:1px solid #ffe082;border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:#7a6000;line-height:1.5}
  @media(prefers-color-scheme:dark){.warning-box{background:#2a2200;border-color:#5a4500;color:#ffd046}}

  /* ── SPINNER ── */
  .spinner{display:inline-block;width:18px;height:18px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── SECTION TITLE ── */
  .section-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin:20px 0 10px}
  .section-title:first-child{margin-top:0}

  /* ── ADD STEP INDICATOR ── */
  .step-dots{display:flex;justify-content:center;gap:6px;margin-bottom:20px}
  .step-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background .2s}
  .step-dot.active{background:var(--accent)}

  /* ── REREAD BADGE ── */
  .reread-badge{display:inline-flex;align-items:center;gap:3px;background:var(--orange);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px;letter-spacing:.2px}
  .cover-reread{position:absolute;top:4px;right:4px;background:var(--orange);color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:99px}

  /* ── HISTORIAL LECTURAS ── */
  .lectura-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
  .lectura-row:last-child{border-bottom:none}
  .lectura-num{font-size:11px;font-weight:700;color:var(--text3);width:18px;flex-shrink:0}
  .lectura-dates{font-size:12px;color:var(--text2);flex:1}
  .lectura-stars{font-size:12px;color:var(--yellow)}
  .lectura-active{font-size:11px;color:var(--orange);font-weight:600}

  /* ── SCROLL FIX ── */
  .tab-content{display:none}
  .tab-content.active{display:block}

  /* ── SEARCH ── */
  .search-input-wrap{position:relative;margin-bottom:14px}
  .search-input-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text3);pointer-events:none}
  .search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px 10px 36px;font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
  .search-input:focus{border-color:var(--accent)}
  .search-input::placeholder{color:var(--text3)}
  .search-result-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
  .search-result-item:last-child{border-bottom:none}
  .search-result-cover{width:36px;height:54px;object-fit:cover;border-radius:5px;background:var(--surface2);flex-shrink:0}
  .search-result-ph{width:36px;height:54px;border-radius:5px;background:linear-gradient(135deg,var(--accent),#5856d6);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
  .search-result-info{flex:1;min-width:0}
  .search-result-title{font-size:13px;font-weight:600;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical}
  .search-result-author{font-size:11px;color:var(--text2);margin-top:2px}
  .search-result-meta{font-size:10px;color:var(--text3);margin-top:3px;display:flex;gap:8px;align-items:center}
  .search-empty{text-align:center;padding:32px 0;color:var(--text3);font-size:13px}
  .search-count{font-size:11px;color:var(--text3);margin-bottom:10px}
</style>
</head>
<body>

<header class="header">
  <h1 id="headerTitle">Inicio</h1>
  <div class="header-actions">
    <button class="icon-btn" id="searchBtn" aria-label="Buscar" style="width:36px;height:36px;border-radius:50%">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <button class="settings-btn" id="settingsBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span class="sync-label" id="syncDot">Ajustes</span>
    </button>
  </div>
</header>

<main class="main">
  <div id="tab-inicio" class="tab-content active"></div>
  <div id="tab-leidos" class="tab-content"></div>
  <div id="tab-estanteria" class="tab-content"></div>
  <div id="tab-abandonados" class="tab-content"></div>
  <div id="tab-stats" class="tab-content"></div>
</main>

<!-- FAB -->
<button class="fab" id="fabBtn" aria-label="Añadir libro">+</button>

<!-- Bottom Nav -->

  <button class="nav-item active" data-tab="inicio">

<script>
// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
const STORAGE_KEY = 'books';
const GHCFG_KEY   = 'books_ghcfg';

let syncSha = null;

function loadGhCfg(){ try{ return JSON.parse(localStorage.getItem(GHCFG_KEY)||'{}') }catch{ return {} } }
function saveGhCfg(c){ localStorage.setItem(GHCFG_KEY, JSON.stringify(c)) }

function loadBooks(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]') }
  catch{ return [] }
}
function saveBooks(arr){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
  syncToGitHub();
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6) }
function today(){ return new Date().toISOString().slice(0,10) }

// ══════════════════════════════════════
//  TABS
// ══════════════════════════════════════
const TABS = ['inicio','leidos','estanteria','abandonados','stats'];
const HEADERS = {inicio:'Inicio',leidos:'Leídos',estanteria:'Estantería',abandonados:'Abandonados',stats:'Estadísticas'};
let currentTab = 'inicio';
let statsCharts = [];

document.querySelectorAll('.nav-item').forEach(btn=>{
  btn.addEventListener('click',()=>switchTab(btn.dataset.tab));
});

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.getElementById('headerTitle').textContent = HEADERS[tab];
  document.getElementById('fabBtn').style.display = tab==='stats' ? 'none' : '';
  renderTab(tab);
}

function renderTab(tab){
  if(tab==='inicio')     renderInicio();
  else if(tab==='leidos')     renderLeidos();
  else if(tab==='estanteria') renderEstanteria();
  else if(tab==='abandonados')renderAbandonados();
  else if(tab==='stats')      renderStats();
}

// ══════════════════════════════════════
//  COVER HELPERS
// ══════════════════════════════════════
function iniLetter(t){ return (t||'?')[0].toUpperCase(); }
function coverImg(b, w, h, cls){
  const style = (w&&h) ? `width:${w}px;height:${h}px` : '';
  const phCls = cls==='inicio-cover' ? 'inicio-cover-ph' : (cls==='drill-cover'?'drill-cover-ph':'book-cover-placeholder');
  const letter = escHtml(iniLetter(b.titulo));
  if(b.portadaUrl){
    // No usar onerror con outerHTML — usar wrapper con display toggle
    return `<div style="position:relative;${style?'width:'+w+'px;height:'+h+'px':''}"><img src="${escHtml(b.portadaUrl)}" class="${cls}" style="${style}" onload="this.parentElement.querySelector('.ph-fallback').style.display='none'" onerror="this.style.display='none';this.parentElement.querySelector('.ph-fallback').style.display='flex'" alt=""><div class="${phCls} ph-fallback" style="${style}display:none">${letter}</div></div>`;
  }
  return `<div class="${phCls}" style="${style}">${letter}</div>`;
}
function coverPHHtml(letter, w, h, cls=''){
  return `<div class="${cls}" style="width:${w}px;height:${h}px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),#5856d6);display:flex;align-items:center;justify-content:center;font-size:${Math.round(h*.22)}px;font-weight:700;color:#fff;flex-shrink:0">${escHtml(letter)}</div>`;
}
function coverPH(letter,w,h){
  const d=document.createElement('div');
  d.style.cssText=`width:${w}px;height:${h}px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),#5856d6);display:flex;align-items:center;justify-content:center;font-size:${Math.round(h*.22)}px;font-weight:700;color:#fff;flex-shrink:0`;
  d.textContent=letter; return d;
}
function starsStr(n){ return '★'.repeat(n||0)+'☆'.repeat(5-(n||0)) }
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function fmtDate(d){ if(!d)return'—'; const dt=new Date(d+'T12:00:00'); return dt.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}) }
function daysBetween(a,b){ if(!a||!b)return null; return Math.round((new Date(b)-new Date(a))/(864e5)) }

// ══════════════════════════════════════
//  RENDER INICIO
// ══════════════════════════════════════
function renderInicio(){
  const books = loadBooks();
  const leyendo   = books.filter(b=>b.estado==='leyendo');
  const leidos    = books.filter(b=>b.estado==='leido');
  const estant    = books.filter(b=>b.estado==='estanteria');
  const thisYear  = new Date().getFullYear();
  const thisYearN = leidos.filter(b=>(b.fechaFin||'').startsWith(thisYear)).length;
  const recientes = [...leidos].sort((a,b)=>(b.fechaFin||'').localeCompare(a.fechaFin||'')).slice(0,6);
  const el = document.getElementById('tab-inicio');

  el.innerHTML = `
    <!-- KPIs -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
      <div class="card" style="padding:14px;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent" onclick="switchTab('leidos')">
        <div style="font-size:26px;font-weight:700;color:var(--accent)">${leidos.length}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px">Leídos</div>
      </div>
      <div class="card" style="padding:14px;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent" onclick="openDrillByYear(${thisYear})">
        <div style="font-size:26px;font-weight:700;color:var(--green)">${thisYearN}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px">Este año</div>
      </div>
      <div class="card" style="padding:14px;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent" onclick="switchTab('estanteria')">
        <div style="font-size:26px;font-weight:700;color:var(--orange)">${estant.length}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px">Pendientes</div>
      </div>
    </div>

    <!-- Leyendo ahora -->
    ${leyendo.length ? leyendo.map(b=>`
    <div class="card" style="margin-bottom:12px">
      <div class="book-current">
        <div class="book-cover-wrap">
          ${coverImg(b,80,120,'book-cover')}
          <span class="badge">Leyendo</span>
        </div>
        <div class="book-info">
          <div class="book-title">${escHtml(b.titulo)}</div>
          <div class="book-author">${escHtml(b.autor||'')}</div>
          ${b.paginas?`<div class="book-meta">${b.paginas} páginas${b.genero?' · '+escHtml(b.genero):''}</div>`:''}
          ${b.fechaInicio?`<div class="book-meta">Empezado ${fmtDate(b.fechaInicio)}</div>`:''}
          <div class="book-actions">
            <button class="btn btn-primary" onclick="finishBook('${b.id}')">Terminado</button>
            <button class="btn btn-danger" onclick="abandonBook('${b.id}')">Abandonar</button>
          </div>
        </div>
      </div>
    </div>`).join('') : `<div class="card" style="padding:16px 18px;margin-bottom:12px;display:flex;align-items:center;gap:12px;color:var(--text2)">
      <span style="font-size:24px">📖</span>
      <div>
        <div style="font-size:14px;font-weight:600;color:var(--text)">Sin lecturas activas</div>
        <div style="font-size:12px;margin-top:2px">Pulsa + para añadir un libro</div>
      </div>
    </div>`}

    <!-- Últimas lecturas -->
    ${recientes.length ? `
    <div style="font-size:13px;font-weight:600;color:var(--text2);margin:4px 4px 10px">Últimas lecturas</div>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px">
      ${recientes.map(b=>`
      <div onclick="openDetail('${b.id}')" style="cursor:pointer;-webkit-tap-highlight-color:transparent">
        <div style="position:relative">
          ${coverImg(b,null,null,'inicio-cover')}
          ${b.lecturas&&b.lecturas.length>1?`<span class="cover-reread">↻${b.lecturas.length}</span>`:''}
        </div>
        <div style="font-size:9px;font-weight:500;margin-top:4px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.25;color:var(--text)">${escHtml(b.titulo)}</div>
        ${b.puntuacion?`<div style="font-size:8px;color:var(--yellow);margin-top:1px">${'★'.repeat(b.puntuacion)}</div>`:''}
      </div>`).join('')}
    </div>` : ''}
  `;
}

// ══════════════════════════════════════
//  RENDER LEÍDOS
// ══════════════════════════════════════
function renderLeidos(){
  const books = loadBooks().filter(b=>b.estado==='leido').sort((a,b)=>(b.fechaFin||'').localeCompare(a.fechaFin||''));
  const el = document.getElementById('tab-leidos');
  if(!books.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">✅</div><h2>Aún no has terminado ninguno</h2><p>Cuando termines un libro aparecerá aquí.</p></div>`;
    return;
  }
  el.innerHTML=`<div class="card">${books.map((b,i)=>`
    <div class="book-list-item" onclick="openDetail('${b.id}')">
      <div style="width:28px;text-align:center;font-size:13px;color:var(--text3);font-weight:600;flex-shrink:0">${i+1}</div>
      ${b.portadaUrl
        ? `<img src="${escHtml(b.portadaUrl)}" class="list-cover" alt="">`
        : `<div class="list-cover-ph">${escHtml(iniLetter(b.titulo))}</div>`
      }
      <div class="list-info">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:nowrap;overflow:hidden">
          <div class="list-title" style="flex-shrink:1;min-width:0">${escHtml(b.titulo)}</div>
          ${b.lecturas&&b.lecturas.length>1?`<span class="reread-badge" style="flex-shrink:0">↻${b.lecturas.length}</span>`:''}
        </div>
        <div class="list-author">${escHtml(b.autor||'')}</div>
        <div style="display:flex;gap:10px;align-items:center;margin-top:3px">
          ${b.puntuacion?`<span style="font-size:11px;color:var(--yellow)">${'★'.repeat(b.puntuacion)}</span>`:''}
          ${b.fechaFin?`<span style="font-size:11px;color:var(--text3)">${fmtDate(b.fechaFin)}</span>`:''}
          ${b.paginas?`<span style="font-size:11px;color:var(--text3)">${b.paginas} pág.</span>`:''}
        </div>
      </div>
      <span class="list-chevron">›</span>
    </div>
  `).join('')}</div>`;
}

// ══════════════════════════════════════
//  RENDER ESTANTERÍA
// ══════════════════════════════════════
function renderEstanteria(){
  const books = loadBooks().filter(b=>b.estado==='estanteria');
  const el = document.getElementById('tab-estanteria');
  if(!books.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📚</div><h2>Estantería vacía</h2><p>Añade libros que quieras leer en el futuro.</p></div>`;
    return;
  }
  // Agrupar por género
  const byGenre = {};
  books.forEach(b=>{
    const g = b.genero || 'Sin clasificar';
    if(!byGenre[g]) byGenre[g]=[];
    byGenre[g].push(b);
  });
  const genres = Object.keys(byGenre).sort();

  el.innerHTML = `
    <div style="font-size:12px;color:var(--text3);margin-bottom:16px;padding:0 2px">${books.length} libro${books.length>1?'s':''} pendiente${books.length>1?'s':''}</div>
    ${genres.map(g=>`
      <div style="margin-bottom:28px">
        <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.9px;margin-bottom:12px;padding:0 2px;display:flex;align-items:center;gap:8px">
          <span>${escHtml(g)}</span>
          <span style="font-size:10px;background:var(--surface2);padding:2px 7px;border-radius:99px;color:var(--text3);font-weight:500;text-transform:none;letter-spacing:0">${byGenre[g].length}</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">
          ${byGenre[g].map(b=>`
            <div onclick="openDetail('${b.id}')" style="cursor:pointer;-webkit-tap-highlight-color:transparent">
              <div style="position:relative;width:100%;aspect-ratio:2/3;border-radius:7px;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,.2);margin-bottom:5px">
                ${b.portadaUrl
                  ? `<img src="${escHtml(b.portadaUrl)}" style="width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt=""><div style="position:absolute;inset:0;background:linear-gradient(135deg,var(--accent),#5856d6);display:none;align-items:center;justify-content:center;font-size:clamp(12px,5vw,18px);font-weight:700;color:#fff">${escHtml(iniLetter(b.titulo))}</div>`
                  : `<div style="position:absolute;inset:0;background:linear-gradient(135deg,var(--accent),#5856d6);display:flex;align-items:center;justify-content:center;font-size:clamp(12px,5vw,18px);font-weight:700;color:#fff">${escHtml(iniLetter(b.titulo))}</div>`
                }
              </div>
              <div style="font-size:9px;font-weight:600;line-height:1.25;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;color:var(--text)">${escHtml(b.titulo)}</div>
              <div style="font-size:8px;color:var(--text3);margin-top:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${escHtml(b.autor||'')}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('')}
  `;
}

// ══════════════════════════════════════
//  RENDER ABANDONADOS
// ══════════════════════════════════════
function renderAbandonados(){
  const books = loadBooks().filter(b=>b.estado==='abandonado').sort((a,b)=>(b.fechaAbandonado||'').localeCompare(a.fechaAbandonado||''));
  const el = document.getElementById('tab-abandonados');
  if(!books.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">🚫</div><h2>Sin abandonados</h2><p>¡Buen trabajo terminando lo que empiezas!</p></div>`;
    return;
  }
  el.innerHTML=`<div class="card">${books.map(b=>`
    <div class="book-list-item" onclick="openDetail('${b.id}')">
      ${b.portadaUrl
        ? `<img src="${escHtml(b.portadaUrl)}" class="list-cover" style="opacity:.6" alt="">`
        : `<div class="list-cover-ph" style="opacity:.6">${escHtml(iniLetter(b.titulo))}</div>`
      }
      <div class="list-info">
        <div class="list-title">${escHtml(b.titulo)}</div>
        <div class="list-author">${escHtml(b.autor||'')}</div>
        ${b.fechaAbandonado?`<div class="list-date">Abandonado ${fmtDate(b.fechaAbandonado)}</div>`:''}
      </div>
      <span class="list-chevron">›</span>
    </div>
  `).join('')}</div>`;
}

// ══════════════════════════════════════
//  RENDER STATS
// ══════════════════════════════════════
function renderStats(){
  statsCharts.forEach(c=>c.destroy());
  statsCharts=[];
  const el = document.getElementById('tab-stats');
  const all = loadBooks().filter(b=>b.estado==='leido');
  if(!all.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📊</div><h2>Sin datos aún</h2><p>Termina tu primer libro para ver estadísticas.</p></div>`;
    return;
  }
  const thisYear = new Date().getFullYear();
  const thisYearBooks = all.filter(b=>(b.fechaFin||'').startsWith(thisYear));
  const totalPages = all.reduce((s,b)=>s+(b.paginas||0),0);
  const avgPages = all.length ? Math.round(totalPages/all.length) : 0;
  const withPages = all.filter(b=>b.paginas);
  const maxPageBook = withPages.length ? withPages.reduce((mx,b)=>b.paginas>mx.paginas?b:mx, withPages[0]) : null;

  // Mejor mes
  const byMonth={};
  all.forEach(b=>{ if(b.fechaFin){ const ym=b.fechaFin.slice(0,7); byMonth[ym]=(byMonth[ym]||0)+1 } });
  const bestMonthEntry = Object.entries(byMonth).sort((a,b)=>b[1]-a[1])[0];
  const bestMonthCount = bestMonthEntry ? bestMonthEntry[1] : 0;
  const bestMonthLabel = bestMonthEntry ? (()=>{ const [y,m]=bestMonthEntry[0].split('-'); return new Date(y,m-1).toLocaleDateString('es-ES',{month:'short',year:'numeric'}) })() : '—';
  const nowYM = new Date().toISOString().slice(0,7);
  const thisMonthCount = byMonth[nowYM]||0;

  // Tiempo medio
  const withDays = all.filter(b=>b.fechaInicio&&b.fechaFin);
  const avgDays = withDays.length ? Math.round(withDays.reduce((s,b)=>s+daysBetween(b.fechaInicio,b.fechaFin),0)/withDays.length) : null;

  // Autores
  const authorMap={};
  all.forEach(b=>{ const a=b.autor||'Desconocido'; authorMap[a]=(authorMap[a]||0)+1 });
  const topAuthors = Object.entries(authorMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const topAuthor = topAuthors[0];

  // Géneros
  const genreMap={};
  all.forEach(b=>{ if(b.genero){ genreMap[b.genero]=(genreMap[b.genero]||0)+1 } });
  const topGenres = Object.entries(genreMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const topGenre = topGenres[0];

  // Por año de lectura (fechaFin)
  const byReadYear={};
  all.forEach(b=>{ const y=(b.fechaFin||'').slice(0,4); if(y) byReadYear[y]=(byReadYear[y]||0)+1 });
  const readYearKeys = Object.keys(byReadYear).sort();

  // Por año de publicación
  const byPubYear={};
  all.forEach(b=>{ if(b.anoPublicacion){ byPubYear[b.anoPublicacion]=(byPubYear[b.anoPublicacion]||0)+1 } });
  const pubYearKeys = Object.keys(byPubYear).sort();

  // Por década de publicación
  const byDecade={};
  all.forEach(b=>{ if(b.anoPublicacion){ const d=Math.floor(b.anoPublicacion/10)*10; byDecade[d]=(byDecade[d]||0)+1 } });
  const decadeKeys = Object.keys(byDecade).sort();

  // Páginas por mes (últimos 12)
  const pagesByMonth={};
  all.forEach(b=>{ if(b.paginas&&b.fechaFin){ const ym=b.fechaFin.slice(0,7); pagesByMonth[ym]=(pagesByMonth[ym]||0)+b.paginas } });
  const monthKeys = Object.keys(pagesByMonth).sort().slice(-12);

  // Ritmo: libros/mes promedio (solo meses con lectura en últimos 12m)
  const recentMonths = Object.entries(byMonth).filter(([ym])=>ym>=new Date(Date.now()-365*864e5).toISOString().slice(0,7));

function openDetail(id){
  const books = loadBooks();
  const b = books.find(x=>x.id===id);
  if(!b) return;
  const sheet = document.getElementById('detailSheet');
  const body  = document.getElementById('detailSheetBody');
  sheet.querySelector('.sheet-title').textContent = '';
  const days = b.fechaInicio&&b.fechaFin ? daysBetween(b.fechaInicio,b.fechaFin) : null;
  const ppd  = days&&b.paginas ? Math.round(b.paginas/days) : null;

  let coverHtml;
  if(b.portadaUrl){
    coverHtml=`<img src="${escHtml(b.portadaUrl)}" class="detail-cover" onerror="this.outerHTML='<div class=detail-cover-ph>${escHtml(iniLetter(b.titulo))}</div>'" alt="">`;
  } else {
    coverHtml=`<div class="detail-cover-ph">${escHtml(iniLetter(b.titulo))}</div>`;
  }

  // Build lecturas history HTML
  const lecturas = b.lecturas && b.lecturas.length > 1 ? b.lecturas : null;
  const lecturasHtml = lecturas ? `
    <div style="margin-bottom:16px">
      <div class="stat-label" style="margin-bottom:6px">Historial de lecturas</div>
      <div class="card" style="overflow:hidden">
        ${lecturas.map((l,i)=>{
          const d = l.fechaInicio&&l.fechaFin ? daysBetween(l.fechaInicio,l.fechaFin) : null;
          const active = !l.fechaFin;
          return `<div class="lectura-row">
            <span class="lectura-num">${i+1}ª</span>
            <span class="lectura-dates">${fmtDate(l.fechaInicio)}${l.fechaFin?' → '+fmtDate(l.fechaFin):''}</span>
            ${active ? `<span class="lectura-active">Leyendo</span>`
              : l.puntuacion ? `<span class="lectura-stars">${'★'.repeat(l.puntuacion)}</span>` : `<span style="font-size:11px;color:var(--text3)">—</span>`}
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  body.innerHTML=`
    <div class="detail-cover-wrap">${coverHtml}</div>
    <div class="detail-title">${escHtml(b.titulo)}</div>
    <div class="detail-author">${escHtml(b.autor||'')}</div>
    ${b.puntuacion&&!lecturas?`<div class="stars-display">${starsStr(b.puntuacion)}</div>`:''}
    <div class="detail-grid">
      ${!lecturas&&b.fechaInicio?`<div class="detail-stat"><div class="detail-stat-label">Inicio</div><div class="detail-stat-value" style="font-size:14px">${fmtDate(b.fechaInicio)}</div></div>`:''}
      ${!lecturas&&b.fechaFin?`<div class="detail-stat"><div class="detail-stat-label">Fin</div><div class="detail-stat-value" style="font-size:14px">${fmtDate(b.fechaFin)}</div></div>`:''}
      ${b.fechaAbandonado?`<div class="detail-stat"><div class="detail-stat-label">Abandonado</div><div class="detail-stat-value" style="font-size:14px">${fmtDate(b.fechaAbandonado)}</div></div>`:''}
      ${!lecturas&&days!==null?`<div class="detail-stat"><div class="detail-stat-label">Días de lectura</div><div class="detail-stat-value">${days}</div></div>`:''}
      ${b.paginas?`<div class="detail-stat"><div class="detail-stat-label">Páginas</div><div class="detail-stat-value">${b.paginas}</div></div>`:''}
      ${!lecturas&&ppd?`<div class="detail-stat"><div class="detail-stat-label">Pág./día</div><div class="detail-stat-value">${ppd}</div></div>`:''}
      ${b.genero?`<div class="detail-stat"><div class="detail-stat-label">Género</div><div class="detail-stat-value" style="font-size:14px">${escHtml(b.genero)}</div></div>`:''}
    </div>
    ${lecturasHtml}
    ${b.notas?`<div class="detail-notes"><div class="stat-label" style="margin-bottom:6px">Notas</div><p>${escHtml(b.notas)}</p></div>`:''}
    ${b.estado==='estanteria'?`<button class="btn btn-primary btn-full" onclick="startReading('${b.id}')">📖 Empezar a leer</button>`:''}
    <button class="btn btn-ghost btn-full" style="margin-top:8px;color:var(--red)" onclick="deleteBook('${b.id}')">Eliminar libro</button>
  `;
  showSheet('detail');
}

function startReading(id){
  const books = loadBooks();
  const b = books.find(x=>x.id===id);
  if(!b) return;
  b.estado='leyendo'; b.fechaInicio=today();
  saveBooks(books);
  hideSheet('detail');
  toast('📖 ¡A leer!');
  renderTab(currentTab);
}

function deleteBook(id){
  if(!confirm('¿Eliminar este libro?')) return;
  const books = loadBooks().filter(b=>b.id!==id);
  saveBooks(books);
  hideSheet('detail');
  toast('Libro eliminado');
  renderTab(currentTab);
}

// ══════════════════════════════════════
//  FINISH / ABANDON
// ══════════════════════════════════════
function finishBook(id){
  const books = loadBooks();
  const b = books.find(x=>x.id===id);
  if(!b) return;
  // Show rating sheet
  const sheet = document.getElementById('detailSheet');
  const body  = document.getElementById('detailSheetBody');
  sheet.querySelector('.sheet-title').textContent = 'Puntuar libro';
  let rating = 0;
  body.innerHTML=`
    <div class="detail-cover-wrap">
      ${b.portadaUrl?`<img src="${escHtml(b.portadaUrl)}" class="detail-cover" alt="">`:`<div class="detail-cover-ph">${escHtml(iniLetter(b.titulo))}</div>`}
    </div>
    <div class="detail-title" style="margin-bottom:4px">${escHtml(b.titulo)}</div>
    <div class="detail-author" style="margin-bottom:20px">${escHtml(b.autor||'')}</div>
    <div class="form-label" style="text-align:center;margin-bottom:10px">¿Qué te pareció?</div>
    <div class="stars-input" id="starsInput" style="justify-content:center;margin-bottom:24px">
      ${[1,2,3,4,5].map(i=>`<span data-v="${i}">☆</span>`).join('')}
    </div>
    <button class="btn btn-primary btn-full" id="confirmFinish">Marcar como terminado</button>
  `;
  document.querySelectorAll('#starsInput span').forEach(s=>{
    s.addEventListener('click',()=>{
      rating=parseInt(s.dataset.v);
      document.querySelectorAll('#starsInput span').forEach((sp,i)=>sp.textContent=i<rating?'★':'☆');
      document.querySelectorAll('#starsInput span').forEach((sp,i)=>sp.classList.toggle('active',i<rating));
    });
  });
  document.getElementById('confirmFinish').addEventListener('click',()=>{
    const fin = today();
    b.estado='leido'; b.fechaFin=fin; if(rating) b.puntuacion=rating;
    // Si tiene lecturas[], actualizar la entrada activa (sin fechaFin)
    if(b.lecturas && b.lecturas.length){
      const active = b.lecturas.find(l=>!l.fechaFin);
      if(active){ active.fechaFin=fin; if(rating) active.puntuacion=rating; }
    }
    saveBooks(books);
    hideSheet('detail');
    toast('🎉 ¡Libro terminado!');
    renderTab(currentTab);
  });
  showSheet('detail');
}

function abandonBook(id){
  if(!confirm('¿Marcar como abandonado?')) return;
  const books = loadBooks();
  const b = books.find(x=>x.id===id);
  if(!b) return;
  b.estado='abandonado'; b.fechaAbandonado=today();
  saveBooks(books);
  toast('Marcado como abandonado');
  renderTab(currentTab);
}

function openDrill(title, books){
  const sorted = [...books].sort((a,b)=>(b.fechaFin||'').localeCompare(a.fechaFin||''));
  const html = `
    <div class="drill-overlay" id="drillOverlay" onclick="e=>{if(e.target.id==='drillOverlay')closeDrill()}">
      <div class="drill-sheet">
        <div class="drill-header">
          <div class="drill-title">${escHtml(title)} <span style="color:var(--text3);font-weight:400;font-size:14px">(${sorted.length})</span></div>
          <button class="icon-btn" onclick="closeDrill()">✕</button>
        </div>
        <div class="drill-body">
          ${sorted.map(b=>`
          <div class="drill-book-item" onclick="closeDrill();setTimeout(()=>openDetail('${b.id}'),200)">
            ${b.portadaUrl
              ? `<img src="${escHtml(b.portadaUrl)}" class="drill-cover" onerror="this.outerHTML='<div class=\\'drill-cover-ph\\'>${escHtml(iniLetter(b.titulo))}</div>'" alt="">`
              : `<div class="drill-cover-ph">${escHtml(iniLetter(b.titulo))}</div>`}
            <div class="drill-info">
              <div class="drill-book-title">${escHtml(b.titulo)}</div>
              <div class="drill-book-author">${escHtml(b.autor||'')}</div>
              <div class="drill-book-year">${b.anoPublicacion?b.anoPublicacion+' · ':''}${b.puntuacion?'★'.repeat(b.puntuacion):''}${b.fechaFin?' · '+fmtDate(b.fechaFin):''}</div>
            </div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  document.getElementById('drillOverlay').addEventListener('click', e=>{
    if(e.target.id==='drillOverlay') closeDrill();
  });
}
function closeDrill(){
  document.getElementById('drillOverlay')?.remove();
}

function openDrillByYear(year){
  const books = loadBooks().filter(b=>b.estado==='leido'&&(b.fechaFin||'').startsWith(year));
  openDrill('Leídos en '+year, books);
}

    </div>
    <div class="form-row">
      <div class="form-group">

      </div>
      <div class="form-group">
        <label class="form-label">Género</label>

    </div>
    <div class="form-group">

    <div class="form-group">
      <label class="form-label">Notas (opcional)</label>
      <textarea class="form-input" id="inNotas" placeholder="Impresiones, citas…">${escHtml(addState.notas||'')}</textarea>
    </div>
    <button class="btn btn-primary btn-full" id="nextToDestino">Siguiente →</button>
  `;
  document.getElementById('nextToDestino').addEventListener('click',()=>{
    const titulo=document.getElementById('inTitulo').value.trim();
    const autor =document.getElementById('inAutor').value.trim();
    if(!titulo){ toast('El título es obligatorio'); return; }
    addState.titulo=titulo; addState.autor=autor;
    addState.paginas=parseInt(document.getElementById('inPaginas').value)||null;
    addState.genero=document.getElementById('inGenero').value.trim()||null;
    addState.portadaUrl=document.getElementById('inPortada').value.trim()||null;
    addState.notas=document.getElementById('inNotas').value.trim()||null;

function renderAddDestino(){
  document.getElementById('addSheet').querySelector('.sheet-title').textContent = '¿Dónde añadir?';

  body.innerHTML=`
    <div class="step-dots"><div class="step-dot"></div><div class="step-dot"></div><div class="step-dot active"></div></div>
    <div class="option-group">
      <button class="option-btn" id="destLeyendo">

        <div><div style="font-weight:600">Leyendo ahora</div><div style="font-size:12px;color:var(--text2);margin-top:2px">Lo empiezo hoy</div></div>
      </button>
      <button class="option-btn" id="destEstanteria">
        <span class="option-icon">📚</span>
        <div><div style="font-weight:600">Estantería</div><div style="font-size:12px;color:var(--text2);margin-top:2px">Lo leeré más adelante</div></div>
      </button>
    </div>
  `;

  document.getElementById('destEstanteria').addEventListener('click',()=>saveNewBook('estanteria'));

function saveNewBook(estado){
  const books=loadBooks();
  const book={
    id: uid(),
    titulo: addState.titulo,
    autor:  addState.autor||null,
    fechaInicio: estado==='leyendo'?today():null,
    fechaFin: null,
    fechaAbandonado: null,
    puntuacion: null,
    paginas: addState.paginas||null,
    genero:  addState.genero||null,
    estado,
    notas:   addState.notas||null,
    portadaUrl: addState.portadaUrl||null,
    addedAt: today()
  };
  books.push(book);
  saveBooks(books);
  hideSheet('add');
  toast(estado==='leyendo'?'📖 ¡A leer!':'📚 Añadido a la estantería');
  renderTab(currentTab);
  if(estado==='leyendo'&&currentTab!=='inicio') switchTab('inicio');
  else if(estado==='estanteria'&&currentTab!=='estanteria') switchTab('estanteria');
}

// ══════════════════════════════════════
//  SHEET UTILS
// ══════════════════════════════════════
function showSheet(name){
  document.getElementById('backdrop').classList.add('show');
  document.getElementById(name+'Sheet').classList.add('show');
}
function hideSheet(name){
  document.getElementById(name+'Sheet').classList.remove('show');
  // Hide backdrop only if no other sheet open
  const anyOpen=['add','detail','settings','search'].some(n=>document.getElementById(n+'Sheet').classList.contains('show'));
  if(!anyOpen) document.getElementById('backdrop').classList.remove('show');
}

['add','detail','settings','search'].forEach(name=>{
  const closeBtn=document.getElementById(name+'Close');
  if(closeBtn) closeBtn.addEventListener('click',()=>hideSheet(name));
});

document.getElementById('backdrop').addEventListener('click',()=>{
  ['add','detail','settings','search'].forEach(n=>hideSheet(n));
});

// ══════════════════════════════════════
//  TOAST
// ══════════════════════════════════════
let toastTimer=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

// ══════════════════════════════════════
//  GITHUB SYNC
// ══════════════════════════════════════
function setSyncStatus(state, msg){
  const el = document.getElementById('syncDot');
  if(!el) return;
  el.className = 'sync-label ' + state;
  if(state==='pending') el.textContent = 'Sync…';
  else if(state==='ok') el.textContent = msg ? msg.replace('Sincronizado · ','') : '✓ Sync';
  else if(state==='error') el.textContent = '✕ Error';
  else el.textContent = 'Ajustes';
}

async function loadFromGitHub(){
  const cfg = loadGhCfg();
  if(!cfg.token || !cfg.user || !cfg.repo) return;
  setSyncStatus('pending','Cargando...');
  try{
    const r = await fetch(`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/data.json`,
      {headers:{'Authorization':'token '+cfg.token,'Accept':'application/vnd.github.v3+json'}});
    if(r.status===404){ setSyncStatus('ok','Sin datos remotos aún'); return; }
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json();
    syncSha = j.sha;
    const b64 = j.content.replace(/\n/g,'');
    const bytes = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
    const remote = JSON.parse(new TextDecoder('utf-8').decode(bytes));
    // Merge: remote wins, keep local-only entries not in remote
    // Remote es la fuente de verdad — no merge con local para evitar duplicados
    localStorage.setItem(STORAGE_KEY, JSON.stringify(remote||[]));
    renderTab(currentTab);
    setSyncStatus('ok','Sincronizado · '+new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){ setSyncStatus('error','Error: '+e.message); }
}

async function syncToGitHub(){
  const cfg = loadGhCfg();
  if(!cfg.token || !cfg.user || !cfg.repo) return;
  setSyncStatus('pending','Guardando...');
  try{
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(loadBooks(),null,2))));
    const body = {message:'update books', content};
    if(syncSha) body.sha = syncSha;
    const r = await fetch(`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/data.json`,{
      method:'PUT',
      headers:{'Authorization':'token '+cfg.token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json();
    syncSha = j.content.sha;
    setSyncStatus('ok','Sincronizado · '+new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){
    if(e.message.includes('409')){ syncSha=null; loadFromGitHub(); }
    else setSyncStatus('error','Error: '+e.message);
  }
}

//  SEARCH
// ══════════════════════════════════════
const STATUS_LABEL = {leido:'Leído',leyendo:'Leyendo',estanteria:'Estantería',abandonado:'Abandonado'};

document.getElementById('searchBtn').addEventListener('click',()=>{
  showSheet('search');
  setTimeout(()=>document.getElementById('searchInput').focus(),300);
});

document.getElementById('searchClose').addEventListener('click',()=>hideSheet('search'));

document.getElementById('searchInput').addEventListener('input', e=>{
  renderSearchResults(e.target.value.trim());
});

function renderSearchResults(q){
  const el = document.getElementById('searchResults');
  if(!q){ el.innerHTML='<div class="search-empty">Escribe para buscar entre tus libros</div>'; return; }
  const books = loadBooks();
  const ql = q.toLowerCase();
  const results = books.filter(b=>{
    return (b.titulo||'').toLowerCase().includes(ql)
      || (b.autor||'').toLowerCase().includes(ql)
      || (b.notas||'').toLowerCase().includes(ql);
  }).sort((a,b)=>{
    // Coincidencias en título primero
    const at = (a.titulo||'').toLowerCase().includes(ql);
    const bt = (b.titulo||'').toLowerCase().includes(ql);
    if(at && !bt) return -1; if(!at && bt) return 1;
    return (b.fechaFin||b.addedAt||'').localeCompare(a.fechaFin||a.addedAt||'');
  });

  if(!results.length){
    el.innerHTML=`<div class="search-empty">Sin resultados para <strong>${escHtml(q)}</strong></div>`;
    return;
  }

  const starsHtml = n => n ? `<span style="color:var(--yellow);font-size:10px">${'★'.repeat(n)}</span>` : '';
  const dateHtml  = b => {
    if(b.fechaFin)      return `<span>${fmtDate(b.fechaFin)}</span>`;
    if(b.fechaAbandonado) return `<span>Abandonado ${fmtDate(b.fechaAbandonado)}</span>`;
    if(b.fechaInicio)   return `<span>Desde ${fmtDate(b.fechaInicio)}</span>`;
    return '';
  };

  el.innerHTML=`
    <div class="search-count">${results.length} resultado${results.length>1?'s':''}</div>
    <div class="card" style="overflow:hidden">
      ${results.map(b=>`
        <div class="search-result-item" onclick="hideSheet('search');setTimeout(()=>openDetail('${b.id}'),200)">
          ${b.portadaUrl
            ? `<img src="${escHtml(b.portadaUrl)}" class="search-result-cover" onerror="this.outerHTML='<div class=search-result-ph>${escHtml(iniLetter(b.titulo))}</div>'" alt="">`
            : `<div class="search-result-ph">${escHtml(iniLetter(b.titulo))}</div>`}
          <div class="search-result-info">
            <div class="search-result-title">${escHtml(b.titulo)}</div>
            <div class="search-result-author">${escHtml(b.autor||'')}</div>
            <div class="search-result-meta">
              <span style="color:var(--accent);font-weight:500">${STATUS_LABEL[b.estado]||''}</span>
              ${starsHtml(b.puntuacion)}
              ${dateHtml(b)}
              ${b.paginas?`<span>${b.paginas} pág.</span>`:''}
            </div>
          </div>
          <span style="color:var(--text3);font-size:14px">›</span>
        </div>
      `).join('')}
    </div>
  `;
}
